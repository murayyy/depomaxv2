<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F52BA" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Depomax" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Teslimat Listesi — Depomax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar__brand"><span class="topbar__mark">D</span> Depomax</div>
    <div class="topbar__user">
      <span class="role-chip" id="plakaEtiketi">…</span>
      <span id="kullaniciAdi">…</span>
      <button class="btn btn-ghost btn-sm" id="cikisBtn">Çıkış</button>
    </div>
  </header>

  <main class="page">
    <div class="page__header">
      <div>
        <div class="page__title">Bugünkü Teslimatlar</div>
        <div class="page__subtitle" id="ozetYazi">Yükleniyor…</div>
      </div>
      <button class="btn btn-primary" id="rotaBulBtn">🗺 En İyi Rotayı Bul</button>
    </div>

    <div class="order-grid" id="siparisList"></div>

    <div class="empty-state u-hidden" id="bosDurum">
      <div class="empty-state__icon">🚚</div>
      <div class="empty-state__title">Atanmış teslimat yok</div>
      <div class="empty-state__text">Bugün için atanmış sipariş bulunmuyor.</div>
    </div>
  </main>
</div>

<script type="module" src="js/surucu.js"></script>
  <script>
    // Eski service worker'ı temizle
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((r) => r.unregister());
      });
    }
  </script>
</body>
</html>
