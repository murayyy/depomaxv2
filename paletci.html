<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Paletçi — Depomax</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<style>
  .palet-kart { background:var(--color-surface-1);border:2px solid var(--color-border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px; }
  .palet-kart.aktif { border-color:var(--color-blue); }
  .palet-no { font-size:18px;font-weight:700;color:var(--color-blue); }
  .palet-urun-satir { display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 8px;background:var(--color-surface-2);border-radius:4px;margin-top:4px; }
  .ai-sonuc { background:var(--color-blue-bg);border:1px solid var(--color-blue);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;line-height:1.6;white-space:pre-wrap; }
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar__brand"><span class="topbar__mark">D</span> Depomax</div>
    <div class="topbar__user">
      <span class="role-chip" id="rolEtiketi">…</span>
      <span id="kullaniciAdi">…</span>
      <button class="btn btn-ghost btn-sm" id="cikisBtn">Çıkış</button>
    </div>
  </header>

  <main class="page">
    <!-- SİPARİŞ LİSTESİ -->
    <div id="listeGorunumu">
      <div class="page__header">
        <div class="page__title">📦 Paletçi Ekranı</div>
      </div>
      <div id="siparisList"></div>
      <div class="empty-state u-hidden" id="bosDurum">
        <div class="empty-state__icon">📦</div>
        <div class="empty-state__title">Paletlenecek sipariş yok</div>
        <div class="empty-state__text">Kontrol aşamasında sipariş bekleniyor.</div>
      </div>
    </div>

    <!-- DETAY -->
    <div id="detayGorunumu" class="u-hidden">
      <div class="page__header" style="flex-wrap:wrap;gap:8px;">
        <div>
          <div class="page__title" id="detayBaslik">—</div>
          <div class="page__subtitle" id="detayMeta">—</div>
        </div>
        <button class="btn btn-ghost" id="geriBtn">← Geri</button>
      </div>

      <!-- Yardımcılar -->
      <div class="card" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <b style="font-size:13px;">👥 Yardımcılar</b>
          <button class="btn btn-ghost btn-sm" id="yardimciEkleBtn">+ Ekle</button>
        </div>
        <div id="yardimciListesi" style="display:flex;gap:8px;flex-wrap:wrap;min-height:24px;"></div>
      </div>

      <!-- AI Analiz -->
      <div class="card" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <b style="font-size:13px;">🤖 AI ile Palet Tahmini</b>
          <label class="btn btn-primary btn-sm" style="cursor:pointer;">
            📷 Fotoğraf Çek / Seç
            <input type="file" id="fotografInput" accept="image/*" capture="environment" class="u-hidden" />
          </label>
        </div>
        <img id="fotografImg" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;display:none;" />
        <div id="aiYukleniyor" class="u-hidden" style="padding:16px;text-align:center;color:var(--color-ink-soft);">🤖 AI analiz ediyor…</div>
        <div id="aiSonuc" class="ai-sonuc u-hidden"></div>
      </div>

      <!-- Paletler -->
      <div class="card" style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <b style="font-size:13px;">🪵 Paletler</b>
          <button class="btn btn-primary btn-sm" id="yeniPaletBtn">+ Yeni Palet</button>
        </div>
        <div id="paletListesi"></div>
      </div>

      <!-- Barkod -->
      <div class="card" style="margin-bottom:14px;">
        <b style="font-size:13px;display:block;margin-bottom:8px;">🔫 Barkod ile Palet'e Ekle</b>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <input class="input" id="barkodInput" placeholder="Barkod okut…" style="max-width:200px;" autocomplete="off" />
          <select class="select" id="hedefPaletSec" style="max-width:150px;">
            <option value="">Palet seç…</option>
          </select>
          <span id="barkodSonuc" style="font-size:12.5px;color:var(--color-green);font-weight:600;"></span>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" id="tamamlaBtn">✅ Paletleme Tamamlandı</button>
      </div>
    </div>
  </main>
</div>
<div id="modalRoot"></div>
<script type="module" src="js/paletci.js"></script>
</body>
</html>
